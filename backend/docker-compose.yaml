services:
  postgres:
    image: postgres:16-alpine
    container_name: rentx-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rentx}
      POSTGRES_USER: ${POSTGRES_USER:-rentx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rentx}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-rentx} -d ${POSTGRES_DB:-rentx}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: rentx-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rentx-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-${POSTGRES_DB:-rentx}}
      DATABASE_USER: ${DATABASE_USER:-${POSTGRES_USER:-rentx}}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-${POSTGRES_PASSWORD:-rentx}}
      DATABASE_SYNCHRONIZE: ${DATABASE_SYNCHRONIZE:-true}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_INTERNAL_PORT: ${MINIO_INTERNAL_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      MINIO_BUCKET: ${MINIO_BUCKET:-rentx}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      SOLANA_COMMITMENT: ${SOLANA_COMMITMENT:-confirmed}
    ports:
      - '${PORT:-3000}:3000'

volumes:
  postgres_data:
  minio_data:
